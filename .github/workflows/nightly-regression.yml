name: Nightly Regression Tests

on:
  schedule:
    # Run every night at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "18.x"

jobs:
  nightly-regression:
    name: Nightly Regression Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: [staging, production]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run comprehensive regression tests
        env:
          BASE_URL: ${{ matrix.environment == 'production' && secrets.PROD_BASE_URL || secrets.STAGING_BASE_URL }}
        run: |
          echo "Running regression tests against ${{ matrix.environment }}"
          node tests/deployment/regression.js
          npm run test:e2e

      - name: Generate regression report
        if: always()
        run: |
          echo "## Nightly Regression Report - ${{ matrix.environment }}" > regression-report.md
          echo "**Date:** $(date)" >> regression-report.md
          echo "**Environment:** ${{ matrix.environment }}" >> regression-report.md
          echo "**Status:** ${{ job.status }}" >> regression-report.md

      - name: Upload regression results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: nightly-regression-${{ matrix.environment }}
          path: |
            regression-report.md
            playwright-report/
            test-results/

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#qa-alerts"
          text: |
            🚨 Nightly regression tests failed!
            Environment: ${{ matrix.environment }}
            Please investigate immediately.
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  performance-monitoring:
    name: Performance Monitoring
    runs-on: ubuntu-latest
    needs: nightly-regression

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        env:
          STAGING_URL: ${{ secrets.STAGING_BASE_URL }}
          PROD_URL: ${{ secrets.PROD_BASE_URL }}
        run: |
          echo "Running performance monitoring..."
          # Add performance test commands here
          node tests/deployment/performance-monitor.js

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-results
          path: performance-report.json
